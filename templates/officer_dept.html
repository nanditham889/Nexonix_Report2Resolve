<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ dept_name }} Issues</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-5xl mx-auto">
        <a href="/officer_hub" class="text-blue-600 mb-4 inline-block font-bold">← Back to Dashboard</a>
        <h1 class="text-3xl font-black mb-8">{{ dept_name }} Department</h1>

        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="p-6">Evidence</th>
                        <th class="p-6">Details</th>
                        <th class="p-6">Status</th>
                        <th class="p-6">Votes</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr class="border-b">
                        <td class="p-6">
                            <img src="{{ url_for('static', filename='uploads/' + item.img_before) }}" 
                                 class="w-24 h-24 object-cover rounded-2xl shadow-sm border">
                        </td>
                        <td class="p-6">
                            <p class="font-bold text-slate-800">{{ item.description }}</p>
                            <small class="text-slate-400">Location: {{ item.lat }}, {{ item.lng }}</small>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-xs font-bold uppercase
                                {% if item.status == 'Resolved' %} bg-emerald-100 text-emerald-600
                                {% elif item.status == 'In Progress' %} bg-blue-100 text-blue-600
                                {% else %} bg-amber-100 text-amber-600 {% endif %}">
                                {{ item.status }}
                            </span>
                        </td>
                        <td class="p-6 font-bold text-lg text-emerald-500">{{ item.vote_count }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
