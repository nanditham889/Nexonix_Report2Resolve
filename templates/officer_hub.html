<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-slate-800">Authority Control Center</h1>
            <p class="text-slate-500 text-lg">Select a department to manage complaints</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <a href="/dept/Roads" class="bg-white p-6 rounded-3xl shadow-sm border hover:shadow-md transition">
                <div class="bg-orange-100 text-orange-600 p-3 rounded-2xl w-fit mb-4"><i data-lucide="map"></i></div>
                <h3 class="text-xl font-bold">Roads</h3>
                <p class="text-slate-400 text-sm">Potholes & Signals</p>
            </a>

            <a href="/dept/Water" class="bg-white p-6 rounded-3xl shadow-sm border hover:shadow-md transition">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-2xl w-fit mb-4"><i data-lucide="droplet"></i></div>
                <h3 class="text-xl font-bold">Water</h3>
                <p class="text-slate-400 text-sm">Leaks & Drainage</p>
            </a>

            <a href="/dept/Electricity" class="bg-white p-6 rounded-3xl shadow-sm border hover:shadow-md transition">
                <div class="bg-yellow-100 text-yellow-600 p-3 rounded-2xl w-fit mb-4"><i data-lucide="zap"></i></div>
                <h3 class="text-xl font-bold">Electricity</h3>
                <p class="text-slate-400 text-sm">Lights & Power</p>
            </a>

            <a href="/dept/Sanitation" class="bg-white p-6 rounded-3xl shadow-sm border hover:shadow-md transition">
                <div class="bg-emerald-100 text-emerald-600 p-3 rounded-2xl w-fit mb-4"><i data-lucide="trash-2"></i></div>
                <h3 class="text-xl font-bold">Sanitation</h3>
                <p class="text-slate-400 text-sm">Garbage & Cleaning</p>
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
