<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Field Worker App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
    <div class="max-w-lg mx-auto">
        <h1 class="text-2xl font-black mb-8 border-b border-zinc-800 pb-4">FIELD TASKS</h1>
        
        <div class="space-y-4">
            {% for item in items %}
            <div class="bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800">
                <div class="flex gap-4 mb-4">
                    <img src="{{ url_for('static', filename='uploads/' + item.img_before) }}" class="w-20 h-20 rounded-2xl object-cover border border-zinc-700">
                    <div>
                        <span class="text-xs text-emerald-400 font-bold uppercase tracking-widest">{{ item.dept }}</span>
                        <h3 class="text-lg font-bold leading-tight mt-1">{{ item.description }}</h3>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    {% if item.status == 'Submitted' %}
                    <a href="/claim/{{ item.id }}" class="flex-1 bg-blue-600 text-center py-4 rounded-2xl font-bold hover:bg-blue-500 transition">CLAIM TASK</a>
                    {% elif item.status == 'In Progress' %}
                    <a href="/resolve/{{ item.id }}" class="flex-1 bg-emerald-600 text-center py-4 rounded-2xl font-bold hover:bg-emerald-500 transition">MARK FIXED</a>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
