<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-2xl font-bold mb-6">Nearby Tasks</h1>
    <div class="space-y-6">
        {% for c in items %}
        <div class="bg-gray-800 p-5 rounded-2xl border border-gray-700">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-lg font-bold text-orange-400">{{ c.dept }} Request</h3>
                <span class="bg-gray-700 px-2 py-1 rounded text-xs">Distance: 0.4km</span>
            </div>
            <p class="text-gray-400 text-sm mb-4">{{ c.description }}</p>
            <form action="/solve/{{c.id}}" method="POST">
                <button class="w-full bg-green-600 p-3 rounded-xl font-bold">Mark as Fixed (Upload Proof)</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
