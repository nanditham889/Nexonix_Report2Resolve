<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report2Resolve | Official Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
        }
        .gov-card {
            transition: all 0.2s ease-in-out;
        }
        .gov-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }
        /* Style for the logo image to keep it responsive and clean */
        .brand-logo {
            width: 120px;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="bg-white border-t-[10px] border-emerald-700 rounded-[3rem] shadow-2xl w-full max-w-2xl overflow-hidden p-10 md:p-16">
        
        <div class="text-center mb-12">
            <div class="flex flex-col items-center justify-center mb-6">
                <img src="{{ url_for('static', filename='Report2Resolve.jpg') }}" alt="Report2Resolve Logo" class="brand-logo mb-4">
                
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">
                    Report<span class="text-emerald-700">2</span>Resolve
                </h1>
            </div>
            
            <p id="tagline" class="text-gray-500 font-medium tracking-wide uppercase text-sm">
                Municipal Operations & Public Service Portal
            </p>
            <div class="w-24 h-1 bg-emerald-600 mx-auto mt-4 rounded-full opacity-30"></div>
        </div>

        <div class="mb-12 max-w-md mx-auto">
            <div class="flex items-center justify-center gap-2 mb-3">
                <i data-lucide="languages" class="w-4 h-4 text-emerald-600"></i>
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest">Select Portal Language</label>
            </div>
            <div class="relative">
                <select id="langSelect" onchange="changeLanguage()" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 text-center text-gray-800 font-bold focus:border-emerald-500 outline-none cursor-pointer hover:bg-gray-100 transition-colors appearance-none">
                    <option value="en">English (Official)</option>
                    <option value="hi">Hindi (हिंदी)</option>
                    <option value="kn">Kannada (ಕನ್ನಡ)</option>
                </select>
                <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-gray-400">
                    <i data-lucide="chevron-down" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <a href="/citizen" class="gov-card group flex items-center p-8 bg-white border-2 border-emerald-50 rounded-3xl hover:bg-emerald-50 transition-all">
                <div class="bg-emerald-600 p-4 rounded-2xl text-white shadow-lg group-hover:scale-110 transition-transform">
                    <i data-lucide="user-plus" class="w-7 h-7"></i>
                </div>
                <div class="ml-6 text-left">
                    <h3 id="role-citizen" class="text-2xl font-extrabold text-gray-900">Citizen Login</h3>
                    <p id="desc-citizen" class="text-gray-500 font-medium">Register complaints & track live updates</p>
                </div>
                <i data-lucide="arrow-right" class="ml-auto text-gray-300 group-hover:text-emerald-600 group-hover:translate-x-2 transition-all"></i>
            </a>

            <a href="/officer" class="gov-card group flex items-center p-8 bg-white border-2 border-orange-50 rounded-3xl hover:bg-orange-50 transition-all">
                <div class="bg-orange-600 p-4 rounded-2xl text-white shadow-lg group-hover:scale-110 transition-transform">
                    <i data-lucide="shield-check" class="w-7 h-7"></i>
                </div>
                <div class="ml-6 text-left">
                    <h3 id="role-officer" class="text-2xl font-extrabold text-gray-900">Authority Login</h3>
                    <p id="desc-officer" class="text-gray-500 font-medium">Verify reports & dispatch field teams</p>
                </div>
                <i data-lucide="arrow-right" class="ml-auto text-gray-300 group-hover:text-orange-600 group-hover:translate-x-2 transition-all"></i>
            </a>

            <a href="/worker" class="gov-card group flex items-center p-8 bg-white border-2 border-blue-50 rounded-3xl hover:bg-blue-50 transition-all">
                <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-lg group-hover:scale-110 transition-transform">
                    <i data-lucide="truck" class="w-7 h-7"></i>
                </div>
                <div class="ml-6 text-left">
                    <h3 id="role-worker" class="text-2xl font-extrabold text-gray-900">Field Staff Login</h3>
                    <p id="desc-worker" class="text-gray-500 font-medium">View assigned tasks & submit proof</p>
                </div>
                <i data-lucide="arrow-right" class="ml-auto text-gray-300 group-hover:text-blue-600 group-hover:translate-x-2 transition-all"></i>
            </a>
        </div>

        <div class="mt-16 text-center border-t border-gray-100 pt-8">
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em]">
                An Initiative of Municipal Administration • Bengaluru
            </p>
        </div>
    </div>

    <script>
        const dict = {
            'en': {
                'tagline': 'Municipal Operations & Public Service Portal',
                'citizen': 'Citizen Login',
                'citizen_d': 'Register complaints & track live updates',
                'officer': 'Authority Login',
                'officer_d': 'Verify reports & dispatch field teams',
                'worker': 'Field Staff Login',
                'worker_d': 'View assigned tasks & submit proof'
            },
            'hi': {
                'tagline': 'नगरपालिका संचालन और जन सेवा पोर्टल',
                'citizen': 'नागरिक लॉगिन',
                'citizen_d': 'शिकायत दर्ज करें और लाइव अपडेट ट्रैक करें',
                'officer': 'प्राधिकारी लॉगिन',
                'officer_d': 'रिपोर्ट सत्यापित करें और टीमें भेजें',
                'worker': 'क्षेत्र कर्मचारी लॉगिन',
                'worker_d': 'कार्य देखें और प्रमाण प्रस्तुत करें'
            },
            'kn': {
                'tagline': 'ನಗರಸಭೆ ಕಾರ್ಯಾಚರಣೆ ಮತ್ತು ಸಾರ್ವಜನಿಕ ಸೇವಾ ಪೋರ್ಟಲ್',
                'citizen': 'ನಾಗರಿಕ ಲಾಗಿನ್',
                'citizen_d': 'ದೂರುಗಳನ್ನು ಸಲ್ಲಿಸಿ ಮತ್ತು ಲೈವ್ ಅಪ್‌ಡೇಟ್ ಗಮನಿಸಿ',
                'officer': 'ಅಧಿಕಾರಿ ಲಾಗಿನ್',
                'officer_d': 'ವರದಿಗಳನ್ನು ಪರಿಶೀಲಿಸಿ ಮತ್ತು ತಂಡಗಳನ್ನು ನಿಯೋಜಿಸಿ',
                'worker': 'ಕ್ಷೇತ್ರ ಸಿಬ್ಬಂದಿ ಲಾಗಿನ್',
                'worker_d': 'ಕೆಲಸಗಳನ್ನು ವೀಕ್ಷಿಸಿ ಮತ್ತು ಪುರಾವೆ ಸಲ್ಲಿಸಿ'
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('tagline').innerText = dict[lang]['tagline'];
            document.getElementById('role-citizen').innerText = dict[lang]['citizen'];
            document.getElementById('desc-citizen').innerText = dict[lang]['citizen_d'];
            document.getElementById('role-officer').innerText = dict[lang]['officer'];
            document.getElementById('desc-officer').innerText = dict[lang]['officer_d'];
            document.getElementById('role-worker').innerText = dict[lang]['worker'];
            document.getElementById('desc-worker').innerText = dict[lang]['worker_d'];
        }

        lucide.createIcons();
    </script>
</body>
</html>
